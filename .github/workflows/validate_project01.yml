name: Validate project01_boolean_logic

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download nand2tetris tools
        run: |
          wget -q "https://drive.google.com/uc?export=download&id=1xZzcMIUETv3u3sdpM_oTJSTetpVee3KZ" -O nand2tetris.zip
          unzip -q nand2tetris.zip
          chmod +x nand2tetris/tools/*.sh

      - name: Copy project01 chips
        run: cp project01_boolean_logic/*.hdl nand2tetris/projects/1/

      - name: Test Not
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/Not.tst

      - name: Test And
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/And.tst

      - name: Test Or
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/Or.tst

      - name: Test Xor
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/Xor.tst

      - name: Test Mux
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/Mux.tst

      - name: Test DMux
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/DMux.tst

      - name: Test Not16
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/Not16.tst

      - name: Test And16
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/And16.tst

      - name: Test Or16
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/Or16.tst

      - name: Test Mux16
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/Mux16.tst

      - name: Test Or8Way
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/Or8Way.tst

      - name: Test Mux4Way16
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/Mux4Way16.tst

      - name: Test Mux8Way16
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/Mux8Way16.tst

      - name: Test DMux4Way
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/DMux4Way.tst

      - name: Test DMux8Way
        run: bash nand2tetris/tools/HardwareSimulator.sh nand2tetris/projects/1/DMux8Way.tst
      
